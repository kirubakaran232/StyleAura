<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4c0519;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#9f1239;stop-opacity:1" />
      <stop offset="65%" style="stop-color:#be123c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f2937;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#fda4af;stop-opacity:0.1" />
    </linearGradient>
    <radialGradient id="spot1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="spot2" cx="70%" cy="60%" r="35%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0" />
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="60" /></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="40" /></filter>
  </defs>

  <!-- Base gradient -->
  <rect width="1600" height="900" fill="url(#bg)" />

  <!-- Soft light spots -->
  <ellipse cx="480" cy="360" rx="500" ry="350" fill="url(#spot1)" filter="url(#blur1)" />
  <ellipse cx="1120" cy="540" rx="450" ry="300" fill="url(#spot2)" filter="url(#blur1)" />

  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="120" fill="url(#glow1)" filter="url(#blur2)" opacity="0.6" />
  <circle cx="1400" cy="750" r="180" fill="url(#glow2)" filter="url(#blur2)" opacity="0.5" />
  <circle cx="800" cy="200" r="80" fill="url(#glow1)" filter="url(#blur2)" opacity="0.4" />
  <circle cx="600" cy="700" r="100" fill="url(#glow2)" filter="url(#blur2)" opacity="0.35" />

  <!-- Floating fashion elements - dress silhouette -->
  <g opacity="0.12" transform="translate(1100, 180)">
    <path d="M60,0 L90,40 L120,180 L80,200 L60,160 L40,200 L0,180 L30,40 Z" fill="#fda4af" />
    <circle cx="60" cy="-10" r="15" fill="#fda4af" />
  </g>

  <!-- Hanger silhouette -->
  <g opacity="0.1" transform="translate(250, 300)">
    <path d="M0,0 L80,0 L80,10 L45,10 L45,60 L40,65 L35,60 L35,10 L0,10 Z" fill="#fb7185" />
    <path d="M30,-20 Q40,-40 50,-20 L45,0 L35,0 Z" fill="#fb7185" />
  </g>

  <!-- Perfume bottle silhouette -->
  <g opacity="0.1" transform="translate(1300, 500)">
    <rect x="20" y="30" width="60" height="100" rx="8" fill="#f43f5e" />
    <rect x="35" y="10" width="30" height="25" rx="4" fill="#f43f5e" />
    <rect x="42" y="0" width="16" height="15" rx="3" fill="#fb7185" />
  </g>

  <!-- Lipstick silhouette -->
  <g opacity="0.1" transform="translate(400, 550)">
    <rect x="15" y="40" width="30" height="70" rx="4" fill="#e11d48" />
    <path d="M15,40 L20,10 Q30,0 40,10 L45,40 Z" fill="#f43f5e" />
  </g>

  <!-- Sparkle dots -->
  <circle cx="350" cy="120" r="3" fill="#fda4af" opacity="0.5" />
  <circle cx="950" cy="80" r="2" fill="#fda4af" opacity="0.4" />
  <circle cx="1200" cy="350" r="2.5" fill="#fda4af" opacity="0.45" />
  <circle cx="500" cy="450" r="2" fill="#fda4af" opacity="0.35" />
  <circle cx="150" cy="600" r="3" fill="#fda4af" opacity="0.3" />
  <circle cx="700" cy="750" r="2" fill="#fda4af" opacity="0.4" />
  <circle cx="1050" cy="650" r="2.5" fill="#fda4af" opacity="0.35" />
  <circle cx="1450" cy="200" r="2" fill="#fda4af" opacity="0.4" />

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fda4af" stroke-width="1" fill="none">
    <line x1="0" y1="150" x2="1600" y2="150" />
    <line x1="0" y1="300" x2="1600" y2="300" />
    <line x1="0" y1="450" x2="1600" y2="450" />
    <line x1="0" y1="600" x2="1600" y2="600" />
    <line x1="0" y1="750" x2="1600" y2="750" />
    <line x1="200" y1="0" x2="200" y2="900" />
    <line x1="400" y1="0" x2="400" y2="900" />
    <line x1="600" y1="0" x2="600" y2="900" />
    <line x1="800" y1="0" x2="800" y2="900" />
    <line x1="1000" y1="0" x2="1000" y2="900" />
    <line x1="1200" y1="0" x2="1200" y2="900" />
    <line x1="1400" y1="0" x2="1400" y2="900" />
  </g>

  <!-- Bottom wave -->
  <path d="M0,800 Q200,750 400,790 T800,770 T1200,785 T1600,760 L1600,900 L0,900 Z" fill="#f5f5f4" opacity="0.08" />
</svg>
