services:
  - type: web
    name: pinterest-blog-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start

  - type: static
    name: pinterest-blog-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
